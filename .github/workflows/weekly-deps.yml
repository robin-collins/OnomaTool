name: Weekly Dependency Testing

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  test-latest-deps:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install with latest dependencies
        run: uv sync --all-extras --upgrade

      - name: Run tests
        run: uv run pytest -x -q --tb=short

      - name: Check key dependency versions
        if: always()
        run: |
          echo "=== Key Dependency Versions ==="
          uv run python -c "
          import importlib.metadata as m
          deps = ['openai', 'google-genai', 'markitdown', 'tiktoken', 'pydantic', 'tqdm']
          for d in deps:
              try: print(f'{d}: {m.version(d)}')
              except: print(f'{d}: not installed')
          "
